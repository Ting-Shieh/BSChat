# BSChat frontend on Netlify (dogfood / production host).
# Site settings: Base directory = frontend（此檔 [build].base 已設）
# Runtime: @netlify/next（自動偵測，無需手動裝 adapter）
# 必填 site env：NEXT_PUBLIC_API_URL（見 frontend/.env.dogfood.example）
# 可選：NEXT_PUBLIC_MEDIA_BASE_URL

[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Serwist service worker — avoid CDN caching a stale SW
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
