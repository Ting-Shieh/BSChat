# BSChat frontend on Netlify (dogfood / production host).
# Runtime: @netlify/next（自動偵測）
# 必填 site env：NEXT_PUBLIC_API_URL

[build]
  command = "npm --prefix frontend run build"
  publish = "frontend/.next"

[build.environment]
  NODE_VERSION = "20"

# Serwist service worker — avoid CDN caching a stale SW
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
