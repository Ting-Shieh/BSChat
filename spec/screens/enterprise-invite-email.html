<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BSChat 企業邀請信預覽</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3f6f5;
      color: #18332f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }
    .preview-label {
      max-width: 560px;
      margin: 30px auto 12px;
      padding: 0 16px;
      color: #6b7f7b;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .email {
      max-width: 560px;
      margin: 0 auto 40px;
      overflow: hidden;
      border: 1px solid #dce6e3;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(16, 42, 38, .08);
    }
    .accent { height: 6px; background: #0f766e; }
    .body { padding: 36px 36px 12px; }
    .eyebrow {
      color: #0f766e;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
    }
    h1 { margin: 18px 0 12px; color: #102a26; font-size: 28px; line-height: 1.3; }
    .intro { margin: 0; color: #4b635f; font-size: 16px; line-height: 1.75; }
    .action { padding: 20px 36px 32px; }
    .button {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 10px;
      background: #0f766e;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
    }
    .expiry { margin: 24px 0 6px; color: #6b7f7b; font-size: 13px; line-height: 1.6; }
    .hint, .link { margin: 0; color: #879995; font-size: 12px; line-height: 1.6; }
    .link { margin-top: 6px; color: #0f766e; word-break: break-all; }
    .footer {
      border-top: 1px solid #e6eeec;
      padding: 20px 36px;
      color: #879995;
      font-size: 12px;
      line-height: 1.6;
    }
    .brand { margin: 18px 0 0; color: #91a19e; font-size: 12px; text-align: center; }
    @media (max-width: 600px) {
      .email { margin-right: 16px; margin-left: 16px; }
      .body, .action, .footer { padding-right: 24px; padding-left: 24px; }
    }
  </style>
</head>
<body>
  <p class="preview-label">Email template preview · 實際欄位會動態替換</p>
  <main class="email">
    <div class="accent"></div>
    <section class="body">
      <div class="eyebrow">BSCHAT · 企業邀請</div>
      <h1>加入威剛智聯</h1>
      <p class="intro">
        Ting Hsieh 邀請你加入 <strong>威剛智聯</strong> 的企業租戶。
        完成註冊或登入後，你將取得企業成員權限。
      </p>
    </section>
    <section class="action">
      <a class="button" href="#">接受企業邀請</a>
      <p class="expiry">邀請連結有效至 2026/07/30，且僅限收到此信的 Email 使用。</p>
      <p class="hint">若按鈕無法開啟，請複製以下連結：</p>
      <p class="link">https://app.example.com/join/enterprise/example-token</p>
    </section>
    <footer class="footer">
      若你不認識邀請人或未預期收到此信，請直接忽略；帳號不會因此自動加入企業。
    </footer>
  </main>
  <p class="brand">BSChat · 在需要的時刻找到對的人</p>
</body>
</html>
